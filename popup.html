<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VPN Awake</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <img class="brand-icon" src="icon-48.png" alt="">
        <div class="headline">
          <h1>VPN Awake</h1>
          <p class="status-pill">
            <span id="statusDot" class="status-dot" aria-hidden="true"></span>
            <span id="statusText">กำลังตรวจสอบสถานะ</span>
          </p>
        </div>
        <label class="switch" title="เปิดหรือปิดการทำงาน">
          <input id="enabledInput" type="checkbox">
          <span></span>
        </label>
      </header>

      <section class="field target-field">
        <label for="urlInput">Target URL</label>
        <input id="urlInput" type="url" spellcheck="false">
      </section>

      <section class="row">
        <label class="field compact" for="intervalInput">
          <span>Interval</span>
          <input id="intervalInput" type="number" min="60" step="60">
        </label>
        <label class="field compact" for="timeoutInput">
          <span>Timeout</span>
          <input id="timeoutInput" type="number" min="3" step="1">
        </label>
      </section>

      <section class="actions">
        <button id="saveButton" class="primary-action" type="button">
          <span class="button-icon icon-save" aria-hidden="true"></span>
          <span>บันทึก</span>
        </button>
        <button id="pingButton" type="button">
          <span class="button-icon icon-refresh" aria-hidden="true"></span>
          <span>Ping</span>
        </button>
        <button id="openButton" type="button">
          <span class="button-icon icon-open" aria-hidden="true"></span>
          <span>เปิด</span>
        </button>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
